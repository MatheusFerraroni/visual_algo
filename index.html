<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Visual Algo</title>
    <link rel="stylesheet" href="./shared/libs/bootstrap.min.css" />
    <link rel="stylesheet" href="./css/global.css" />
  </head>
  <body>
    <main class="container py-5">
      <header class="page-header mb-5">
        <p class="text-uppercase small fw-semibold text-secondary mb-2">
          Visual Algo
        </p>
        <h1 class="display-5 fw-bold mb-3">Demonstracoes visuais de algoritmos</h1>
        <p class="lead text-secondary mb-0">
          Base simples para publicar projetos independentes no GitHub Pages.
        </p>
      </header>

      <section aria-labelledby="projects-title">
        <div class="d-flex align-items-center justify-content-between mb-3">
          <h2 id="projects-title" class="h4 mb-0">Projetos disponiveis</h2>
          <span class="badge text-bg-light border">2 itens</span>
        </div>

        <div class="list-group shadow-sm">
          <a
            class="list-group-item list-group-item-action d-flex justify-content-between align-items-start"
            href="./projects/kmeans/index.html"
          >
            <div class="me-3">
              <div class="fw-semibold">kmeans</div>
              <div class="small text-secondary">
                Base inicial para a demonstracao do algoritmo K-Means.
              </div>
            </div>
            <span class="btn btn-sm btn-outline-dark">Abrir</span>
          </a>
          <a
            class="list-group-item list-group-item-action d-flex justify-content-between align-items-start"
            href="./projects/template/index.html"
          >
            <div class="me-3">
              <div class="fw-semibold">template</div>
              <div class="small text-secondary">
                Modelo inicial para novas demonstracoes.
              </div>
            </div>
            <span class="btn btn-sm btn-outline-dark">Abrir</span>
          </a>
        </div>
      </section>
    </main>
  </body>
</html>
